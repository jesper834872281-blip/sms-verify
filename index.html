<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>虚拟接码 — 快速注册验证</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script>
// ⚠️ 部署到Vercel后把下面地址换成你的Vercel地址
const API_BASE = "https://sms-verify-three.vercel.app";
let orderId = null;
let pollTimer = null;
let countdownTimer = null;
let secondsLeft = 120;
let btnCooldownTimer = null;

// 辅助函数：清理所有记忆
function clearMemory() {
  localStorage.removeItem('sms_cooldown_time');
  localStorage.removeItem('sms_phone');
  localStorage.removeItem('sms_order_id');
}

// 🌟 1. 页面加载时：全面恢复现场！
window.onload = function() {
  const lastTime = localStorage.getItem('sms_cooldown_time');
  const savedPhone = localStorage.getItem('sms_phone');
  const savedOrderId = localStorage.getItem('sms_order_id');

  if (lastTime) {
    const elapsed = Math.floor((Date.now() - parseInt(lastTime)) / 1000);
    
    if (elapsed < 120) {
      const remainingTime = 120 - elapsed;
      // 恢复按钮冷却
      startButtonCooldown(remainingTime);

      // 🌟 如果号码和订单号还在，把它们也恢复出来！
      if (savedPhone && savedOrderId) {
        orderId = savedOrderId; // 恢复核心订单号
        
        // 恢复 UI 界面
        document.getElementById('phonePlaceholder').style.display = 'none';
        document.getElementById('phoneNumber').style.display = 'block';
        document.getElementById('phoneNumber').textContent = '+' + savedPhone;
        document.getElementById('copyBtn').style.display = 'block';
        document.getElementById('timerDisplay').style.display = 'block';
        setStatus('页面已恢复，继续等待短信...', 'info');

        // 继续倒计时和轮询短信
        startCountdown(remainingTime);
        startPolling();
      }
    } else {
      // 时间到了，清理掉所有过期的记忆
      clearMemory();
    }
  }
};

function setStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar ' + type;
}

function startButtonCooldown(seconds) {
  const btn = document.getElementById('getNumBtn');
  btn.disabled = true;
  let remaining = seconds;
  
  if (btnCooldownTimer) clearInterval(btnCooldownTimer);
  
  btnCooldownTimer = setInterval(() => {
    remaining--;
    btn.textContent = `冷却中 (${remaining}s)`;
    if (remaining <= 0) {
      clearInterval(btnCooldownTimer);
      btn.disabled = false;
      btn.textContent = '重新获取';
      clearMemory(); // 冷却结束，清理记忆
    }
  }, 1000);
}

async function getNumber() {
  const service = document.getElementById('serviceSelect').value;
  const country = document.getElementById('countrySelect').value;
  const btn = document.getElementById('getNumBtn');
  btn.disabled = true;
  btn.textContent = '请求中...';
  setStatus('正在请求号码...', 'info');

  try {
    const res = await fetch(`${API_BASE}/api/get-number?service=${service}&country=${country}`);
    const data = await res.json();
    if (data.phone) {
      orderId = data.order_id;
      document.getElementById('phonePlaceholder').style.display = 'none';
      document.getElementById('phoneNumber').style.display = 'block';
      document.getElementById('phoneNumber').textContent = '+' + data.phone;
      document.getElementById('copyBtn').style.display = 'block';
      document.getElementById('timerDisplay').style.display = 'block';
      setStatus('号码已获取！请到目标平台填入此号码。', 'success');
      
      // 🌟 2. 获取成功时：把所有重要信息都记在小本本上
      localStorage.setItem('sms_cooldown_time', Date.now());
      localStorage.setItem('sms_phone', data.phone);
      localStorage.setItem('sms_order_id', orderId);

      startButtonCooldown(120); 
      startCountdown(120); // 传入 120 秒初始值
      startPolling();
    } else {
      throw new Error(data.error || '获取失败');
    }
  } catch(e) {
    setStatus('获取失败：' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '获取号码';
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    try {
      const res = await fetch(`${API_BASE}/api/get-sms?order_id=${orderId}`);
      const data = await res.json();
      if (data.status === 'ok') {
        clearInterval(pollTimer);
        clearInterval(countdownTimer);
        document.getElementById('codeDisplay').innerHTML =
          `<div class="code-value">${data.code}</div>
           <div style="font-size:11px;color:var(--muted)">验证码已到达 · 请尽快填入</div>`;
        setStatus('✓ 验证码接收成功！', 'success');
        finishOrder();
        
        // 🌟 3. 短信到达：任务完成，提前解除锁定并清空记忆
        clearInterval(btnCooldownTimer);
        clearMemory();
        const btn = document.getElementById('getNumBtn');
        btn.disabled = false;
        btn.textContent = '获取新号码';
      }
    } catch(e) {}
  }, 3000);
}

// 🌟 修改：支持传入剩余时间
function startCountdown(initialSeconds) {
  secondsLeft = initialSeconds;
  document.getElementById('timerSec').textContent = secondsLeft; // 立刻更新一次 UI
  
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    secondsLeft--;
    document.getElementById('timerSec').textContent = secondsLeft;
    if (secondsLeft <= 0) {
      clearInterval(countdownTimer);
      clearInterval(pollTimer);
      setStatus('等待超时，请重新获取。', 'error');
      
      // 超时后重置按钮和记忆
      clearInterval(btnCooldownTimer);
      clearMemory();
      const btn = document.getElementById('getNumBtn');
      btn.disabled = false;
      btn.textContent = '重新获取';
    }
  }, 1000);
}

async function finishOrder() {
  if (!orderId) return;
  try {
    await fetch(`${API_BASE}/api/finish-order`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({order_id: orderId})
    });
  } catch(e) {}
}

function copyPhone() {
  const phone = document.getElementById('phoneNumber').textContent;
  navigator.clipboard.writeText(phone).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '已复制';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}
</script>
</body>
</html>
