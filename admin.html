<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>卡密管理后台</title>
    <style>
        body { background: #0d0f14; color: #e8eaf0; font-family: sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 640px; background: #151820; border: 1px solid #252a36; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
        h2 { color: #00e5a0; margin-bottom: 20px; border-bottom: 1px solid #252a36; padding-bottom: 10px; }
        .controls { margin-bottom: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
        input, select { background: #0d0f14; border: 1px solid #252a36; color: #fff; padding: 10px; border-radius: 6px; flex: 1; outline: none; font-family: monospace; min-width: 120px; }
        .btn { padding: 10px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-green { background: #00e5a0; color: #000; }
        .btn-blue { background: #0099ff; color: #fff; }
        .btn-red { background: #ff4d6a; color: #fff; font-size: 12px; padding: 6px 12px; }
        .btn-copy { background: transparent; border: 1px solid #00e5a0; color: #00e5a0; font-size: 12px; padding: 6px 12px; }
        .code-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #252a36; gap: 10px; }
        .code-info { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .code-text { font-family: monospace; font-size: 15px; color: #0099ff; }
        .code-meta { font-size: 11px; color: #6b7280; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .badge-ok { background: rgba(0,229,160,0.15); color: #00e5a0; }
        .badge-used { background: rgba(255,77,106,0.15); color: #ff4d6a; }
        .msg { margin-top: 12px; font-size: 13px; color: #00e5a0; text-align: center; min-height: 20px; }
        .empty { color: #6b7280; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<!-- 生码区 -->
<div class="container">
    <h2>🔑 生成授权码</h2>
    <div class="controls">
        <input type="password" id="genPass" placeholder="管理员密码">
        <select id="genCountry">
            <option value="16">🇬🇧 英国</option>
            <option value="73">🇧🇷 巴西</option>
            <option value="187">🇺🇸 美国</option>
        </select>
        <button class="btn btn-green" onclick="generateCode()">生成授权码</button>
    </div>
    <div class="msg" id="genMsg"></div>
</div>

<!-- 列表区 -->
<div class="container">
    <h2>📋 授权码列表</h2>
    <div class="controls">
        <input type="password" id="adminKey" placeholder="管理员总密码">
        <button class="btn btn-blue" onclick="loadCodes()">刷新列表</button>
    </div>
    <div id="list">
        <p class="empty">输入总密码并点击刷新...</p>
    </div>
</div>

<script>
    async function generateCode() {
        const pass = document.getElementById('genPass').value.trim();
        const country = document.getElementById('genCountry').value;
        const msg = document.getElementById('genMsg');

        if (!pass) return msg.textContent = '请输入管理员密码';
        msg.style.color = '#6b7280';
        msg.textContent = '生成中...';

        try {
            const res = await fetch(`/api/generate?adminPass=${pass}&country=${country}`);
            const data = await res.json();
            if (data.error) {
                msg.style.color = '#ff4d6a';
                msg.textContent = '❌ ' + data.error;
            } else {
                msg.style.color = '#00e5a0';
                msg.textContent = `✓ 生成成功：${data.code}`;
                // 自动刷新列表
                const adminKey = document.getElementById('adminKey').value;
                if (adminKey) loadCodes();
            }
        } catch(e) {
            msg.style.color = '#ff4d6a';
            msg.textContent = '网络错误';
        }
    }

    async function loadCodes() {
        const key = document.getElementById('adminKey').value.trim();
        if (!key) return alert('请输入总密码');

        const listDiv = document.getElementById('list');
        listDiv.innerHTML = '<p class="empty">加载中...</p>';

        try {
            const res = await fetch(`/api/list-codes?key=${key}`);
            const data = await res.json();

            if (data.error) {
                listDiv.innerHTML = `<p class="empty" style="color:#ff4d6a">${data.error}</p>`;
                return;
            }

            if (data.length === 0) {
                listDiv.innerHTML = '<p class="empty">暂无授权码</p>';
                return;
            }

            // 按状态排序：可用的在前
            data.sort((a, b) => a.uses - b.uses);

            listDiv.innerHTML = '';
            data.forEach(item => {
                const isUsed = parseInt(item.uses) >= 2;
                const div = document.createElement('div');
                div.className = 'code-item';
                div.innerHTML = `
                    <div class="code-info">
                        <span class="code-text">${item.code}</span>
                        <span class="code-meta">已用 ${item.uses}/2 次 · 国家: ${item.country} · <span class="badge ${isUsed ? 'badge-used' : 'badge-ok'}">${item.status}</span></span>
                    </div>
                    <div style="display:flex;gap:6px">
                        <button class="btn btn-copy" onclick="copyText('${item.code}', this)">复制</button>
                        <button class="btn btn-red" onclick="revokeCode('${item.code}')">作废</button>
                    </div>
                `;
                listDiv.appendChild(div);
            });
        } catch(e) {
            listDiv.innerHTML = '<p class="empty" style="color:#ff4d6a">获取失败，请检查网络</p>';
        }
    }

    async function revokeCode(code) {
        if (!confirm(`确定要作废授权码 ${code} 吗？`)) return;
        const key = document.getElementById('adminKey').value.trim();
        try {
            const res = await fetch(`/api/list-codes?key=${key}&revoke=${code}`);
            const data = await res.json();
            if (data.success) {
                alert('已作废');
                loadCodes();
            } else {
                alert(data.error || '作废失败');
            }
        } catch(e) {
            alert('网络错误');
        }
    }

    function copyText(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
            btn.textContent = '已复制!';
            setTimeout(() => btn.textContent = '复制', 1000);
        });
    }
</script>
</body>
</html>
