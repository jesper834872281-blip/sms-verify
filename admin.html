<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>卡密管理后台</title>
    <style>
        body { background: #0d0f14; color: #e8eaf0; font-family: sans-serif; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: #151820; border: 1px solid #252a36; border-radius: 12px; padding: 24px; }
        h2 { color: #00e5a0; margin-bottom: 20px; border-bottom: 1px solid #252a36; padding-bottom: 10px; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        input { background: #0d0f14; border: 1px solid #252a36; color: #fff; padding: 10px; border-radius: 6px; flex: 1; outline: none; }
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-refresh { background: #00e5a0; color: #000; }
        .code-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #252a36; }
        .code-info { display: flex; flex-direction: column; }
        .code-text { font-family: monospace; font-size: 16px; color: #0099ff; }
        .code-country { font-size: 12px; color: #6b7280; }
        .btn-copy { background: transparent; border: 1px solid #00e5a0; color: #00e5a0; font-size: 12px; }
        .btn-copy:active { background: #00e5a0; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <h2>卡密管理面板</h2>
        <div class="controls">
            <input type="password" id="adminKey" placeholder="输入管理员总密码">
            <button class="btn btn-refresh" onclick="loadCodes()">刷新列表</button>
        </div>
        <div id="list">
            <p style="color: #6b7280; text-align: center;">输入总密码并点击刷新...</p>
        </div>
    </div>

    <script>
        async function loadCodes() {
            const key = document.getElementById('adminKey').value;
            if(!key) return alert('请输入总密码');
            
            try {
                const res = await fetch(`/api/list-codes?key=${key}`);
                const data = await res.json();
                
                if(data.error) return alert(data.error);

                const listDiv = document.getElementById('list');
                listDiv.innerHTML = '';

                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'code-item';
                    div.innerHTML = `
                        <div class="code-info">
                            <span class="code-text">${item.code}</span>
                            <span class="code-country">${item.country}</span>
                        </div>
                        <button class="btn btn-copy" onclick="copyText('${item.code}', this)">复制卡密</button>
                    `;
                    listDiv.appendChild(div);
                });
            } catch(e) {
                alert('获取失败，请检查网络');
            }
        }

        function copyText(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerText;
                btn.innerText = '已复制!';
                setTimeout(() => btn.innerText = oldText, 1000);
            });
        }
    </script>
</body>
</html>
